<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>대학교 시간표</title>
  <style>
    :root{
      --bg:#0b0f17;
      --panel:#111827;
      --panel2:#0f172a;
      --line:rgba(255,255,255,.12);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.65);
      --danger:#ff3b3b;
      --cellH:68px;
      --radius:14px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR", Arial, "Apple SD Gothic Neo";
      background:linear-gradient(180deg, #0b0f17, #05070c);
      color:var(--text);
    }
    .app{
      display:flex;
      gap:14px;
      height:100vh;
      padding:14px;
    }

    /* 왼쪽: 설정/리스트 (1/3) */
    .left{
      flex: 1 1 34%;
      min-width: 320px;
      background:rgba(17,24,39,.72);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:14px;
      overflow:auto;
    }

    /* 오른쪽: 시간표 (2/3) */
    .right{
      flex: 2 1 66%;
      background:rgba(15,23,42,.58);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:14px;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    .titleRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }
    .titleRow h1{
      font-size:16px;
      margin:0;
      letter-spacing:.2px;
    }
    .hint{
      color:var(--muted);
      font-size:12px;
      white-space:nowrap;
    }

    .gridWrap{
      position:relative;
      flex:1;
      overflow:auto;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.12);
    }

    /* 시간표 그리드: (1열=요일 라벨) + (11열=1~11교시) */
    .timetable{
      display:grid;
      grid-template-columns: 120px repeat(5, minmax(120px, 1fr));
      grid-template-rows: 44px repeat(11, var(--cellH));
      min-width: 90px + 11*88px;
    }
    .cell{
      border-right:1px solid var(--line);
      border-bottom:1px solid var(--line);
      padding:8px;
      font-size:12px;
      color:var(--muted);
      display:flex;
      align-items:center;
      justify-content:center;
      user-select:none;
    }
    .cell.header{
      position:sticky;
      top:0;
      z-index:3;
      background:rgba(11,15,23,.92);
      color:rgba(255,255,255,.78);
      font-weight:600;
      font-size:12px;
      border-bottom:1px solid var(--line);
    }
    .cell.time{
      position:sticky;
      left:0;
      z-index:2;
      background:rgba(11,15,23,.92);
      color:rgba(255,255,255,.78);
      font-weight:600;
      border-right:1px solid var(--line);
    }
    .cell.corner{
      position:sticky;
      left:0;
      top:0;
      z-index:4;
      background:rgba(11,15,23,.95);
      border-right:1px solid var(--line);
      border-bottom:1px solid var(--line);
    }

    /* 강의 블록: grid 위에 그대로 올리기 */
    .block{
      z-index:5;
      margin:6px;
      border-radius:12px;
      padding:8px 10px;
      color:#081018;
      font-size:12px;
      line-height:1.2;
      box-shadow: 0 8px 22px rgba(0,0,0,.35);
      cursor:pointer;
      display:flex;
      flex-direction:column;
      justify-content:center;
      border:2px solid rgba(0,0,0,.18);
      overflow:hidden;
    }
    .block .name{
      font-weight:800;
      font-size:12.5px;
      margin-bottom:4px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .block .meta{
      font-size:11px;
      opacity:.9;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .block.conflict{
      border:3px solid var(--danger);
      box-shadow: 0 0 0 2px rgba(255,59,59,.22), 0 8px 22px rgba(0,0,0,.35);
    }

    /* 하단 버튼 */
    .bottomBar{
      display:flex;
      justify-content:flex-end;
      gap:10px;
      margin-top:10px;
    }
    button{
      border:1px solid var(--line);
      background:rgba(255,255,255,.06);
      color:var(--text);
      padding:10px 12px;
      border-radius:12px;
      cursor:pointer;
      font-weight:650;
    }
    button:hover{ background:rgba(255,255,255,.10); }
    button.danger{
      border-color: rgba(255,59,59,.55);
      background: rgba(255,59,59,.12);
    }
    button.danger:hover{
      background: rgba(255,59,59,.18);
    }

    /* 왼쪽 패널 UI */
    .sectionTitle{
      font-size:13px;
      font-weight:800;
      margin:6px 0 10px;
    }
    .muted{ color:var(--muted); font-size:12px; }
    .row{
      display:flex; gap:8px; align-items:center; flex-wrap:wrap;
      margin-bottom:10px;
    }
    .pill{
      padding:7px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
      font-size:12px;
      cursor:pointer;
      user-select:none;
    }
    .pill.active{
      border-color: rgba(120,160,255,.7);
      background: rgba(120,160,255,.14);
    }
    details{
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 10px;
      background:rgba(0,0,0,.10);
      margin-bottom:10px;
    }
    summary{
      cursor:pointer;
      font-weight:800;
      color:rgba(255,255,255,.86);
      list-style:none;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }
    summary::-webkit-details-marker{ display:none; }
    .countBadge{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
    }
    .course{
      margin-top:10px;
      padding:10px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .courseTop{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
    }
    .courseName{
      font-weight:900;
      font-size:13px;
      margin:0;
    }
    .courseInfo{
      color:var(--muted);
      font-size:12px;
      margin-top:2px;
      line-height:1.35;
    }
    .courseActions{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    input[type="color"]{
      width:42px; height:34px;
      border:none; padding:0; background:transparent;
      cursor:pointer;
    }
    .smallBtn{
      padding:8px 10px;
      border-radius:10px;
      font-size:12px;
      font-weight:800;
    }
    .smallBtn.add{ border-color: rgba(92,255,180,.40); background: rgba(92,255,180,.12); }
    .smallBtn.add:hover{ background: rgba(92,255,180,.18); }
    .smallBtn.remove{ border-color: rgba(255,180,92,.40); background: rgba(255,180,92,.12); }
    .smallBtn.remove:hover{ background: rgba(255,180,92,.18); }

    @media (max-width: 980px){
      .app{ flex-direction:column; }
      .left{ min-width:unset; }
      .right{ min-height:55vh; }
    }
  </style>
</head>

<body>
  <div class="app">
    <!-- LEFT: course list + settings -->
    <aside class="left">
      <div class="sectionTitle">강의 리스트 / 블록 색상 🎨</div>
      <div class="muted">학년별로 접었다 펼칠 수 있고, 색 바꾸고 “추가” 누르면 시간표에 들어감. 블록 클릭하면 제거됨.</div>

      <div style="height:10px"></div>

      <div class="sectionTitle">학년 토글 (리스트 표시용) 🧷</div>
      <div class="row" id="gradeToggles"></div>

      <div style="height:6px"></div>

      <div class="sectionTitle">학년별 강의</div>
      <div id="courseAccordions"></div>
    </aside>

    <!-- RIGHT: timetable -->
    <main class="right">
      <div class="titleRow">
        <h1>시간표 (월~금 / 1~11교시)</h1>
        <div class="hint">겹치는 강의 블록은 <b style="color:#ff7a7a">빨간 테두리</b>로 표시됨 · 블록 클릭=삭제</div>
      </div>

      <div class="gridWrap">
        <div class="timetable" id="timetable"></div>
      </div>

      <div class="bottomBar">
        <button class="danger" id="resetBtn">시간표 초기화 🧨</button>
      </div>
    </main>
  </div>

  <script>
    /***********************
     * 0) 기본 상수/유틸
     ************************/
    const DAYS = ["월","화","수","목","금"];
    const STORAGE_KEY = "timetable_v1";
    const PERIODS = [
      {p:1, label:"1교시", time:"9:00"},
      {p:2, label:"2교시", time:"10:00"},
      {p:3, label:"3교시", time:"11:00"},
      {p:4, label:"4교시", time:"12:00"},
      {p:5, label:"5교시", time:"13:00"},
      {p:6, label:"6교시", time:"14:00"},
      {p:7, label:"7교시", time:"15:00"},
      {p:8, label:"8교시", time:"16:00"},
      {p:9, label:"9교시", time:"17:00"},
      {p:10,label:"10교시", time:"18:00"},
      {p:11,label:"11교시", time:"19:00"},
    ];

    function saveState(){
      const data = {
        placed: Array.from(placed),
        colorsById,
        gradeFilter: Array.from(gradeFilter),
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }
    
    function loadState(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return;
        const data = JSON.parse(raw);
     
        if(Array.isArray(data.placed)) placed = new Set(data.placed.map(String));
        if(data.colorsById && typeof data.colorsById === "object") colorsById = data.colorsById;
        if(Array.isArray(data.gradeFilter)) gradeFilter = new Set(data.gradeFilter.map(Number));
      }catch(e){
      }
    }

    // "월123" / "화567" 같은 문자열을 {day:"월", periods:[1,2,3]} 로 파싱
    function parseTimeToken(token){
      // day: 한글 1글자(월~금) + 뒤는 숫자들
      const day = token?.trim()?.[0];
      const nums = token?.trim()?.slice(1) || "";
      const periods = [...nums].map(ch => parseInt(ch,10)).filter(n => Number.isFinite(n));
      if(!DAYS.includes(day)) return null;
      if(periods.some(p => p < 1 || p > 11)) return null;
      return { day, periods };
    }

    // 랜덤-ish 기본 색
    function defaultColorFor(id){
      // 간단 해시 → HSL 느낌 내려고 했는데 input[type=color]는 hex 필요해서 대충 팔레트
      const palette = ["#7AA7FF","#8DFFB5","#FFD27A","#FF8BCB","#A58BFF","#7AFFF2","#FF7A7A","#C2FF7A"];
      let h = 0;
      for(const c of id) h = (h * 31 + c.charCodeAt(0)) >>> 0;
      return palette[h % palette.length];
    }

    /***********************
     * 1) 상태(State)
     ************************/
    let courses = [];            // 로드된 강의
    let colorsById = {};         // {courseId: "#RRGGBB"}
    let placed = new Set();      // 시간표에 배치된 courseId
    let occupancy = {};          // {"월-1": ["CS101","..."], ...}
    let conflictSet = new Set(); // 겹치는 courseId
    let gradeFilter = new Set([1,2,3,4]); // 리스트 표시용 (시간표 편성은 무관)

    /***********************
     * 2) 데이터 로드
     ************************/
    const FALLBACK = [
      { id:"CS101", name:"프로그래밍기초", times:["월123","수12"], room:"공학관 101", category:"전공", req:"필수", grade:1 },
      { id:"DES201", name:"게임UI/UX",      times:["화567"],      room:"디자인관 302", category:"전공", req:"선택", grade:2 },
      { id:"GEN110", name:"글쓰기",         times:["목34"],       room:"인문관 210", category:"교양", req:"필수", grade:1 },
      { id:"MATH120", name:"이산수학",      times:["월12","금1"], room:"자연관 112", category:"전공", req:"필수", grade:1 },
    ];

    async function loadCourses(){
      try{
        const res = await fetch("./courses.json", { cache:"no-store" });
        if(!res.ok) throw new Error("fetch failed");
        const data = await res.json();
        return Array.isArray(data) ? data : FALLBACK;
      }catch(e){
        // 파일 더블클릭으로 열면 fetch가 막힐 수 있어서 fallback 제공
        return FALLBACK;
      }
    }

    /***********************
     * 3) 시간표 그리드 렌더
     ************************/
    function renderGrid(){
      const el = document.getElementById("timetable");
      el.innerHTML = "";

      // 좌상단 코너
      el.appendChild(makeCell("", "cell header corner"));

      // 상단 헤더(교시)
      for(const d of DAYS){
        el.appendChild(makeCell(d, "cell header"));
      }

      for(const it of PERIODS){
        el.appendChild(
          makeCell(
            `${it.label}<br><span style="font-weight:600;color:rgba(255,255,255,.55)">${it.time}</span>`,
            "cell time"
            )
          );
        for(let i=0; i<5; i++){
          el.appendChild(makeCell("", "cell"));
        }
      }
      renderBlocks(el);
    }

    function makeCell(html, cls){
      const div = document.createElement("div");
      div.className = cls;
      div.innerHTML = html;
      return div;
    }

    // 블록을 grid 위에 직접 올림(grid-row/column + span)
    function renderBlocks(container){
      // conflict 계산
      computeConflicts();

      // 배치된 강의들만
      const placedCourses = courses.filter(c => placed.has(c.id));

      // 각 강의가 여러 times를 가질 수 있으니 토큰별로 블록 생성
      for(const c of placedCourses){
        const color = colorsById[c.id] || defaultColorFor(c.id);

        for(const token of c.times){
          const parsed = parseTimeToken(token);
          if(!parsed) continue;

          const start = Math.min(...parsed.periods);
          const end = Math.max(...parsed.periods);
          const span = end - start + 1;

          const dayIndex = DAYS.indexOf(parsed.day); // 0..4
          if(dayIndex < 0) continue;

          const block = document.createElement("div");
          block.className = "block" + (conflictSet.has(c.id) ? " conflict" : "");
          block.style.background = color;

          // grid positioning:
          // rows: 1 header, then day rows start at 2
          // cols: 1 day label, then periods start at 2
          block.style.gridRow = (2 + (start - 1)) + " / span " + span;
          block.style.gridColumn = (2 + dayIndex) + " / span 1";

          block.innerHTML = `
            <div class="name">${escapeHtml(c.name)}</div>
            <div class="meta">${escapeHtml(c.room)} · ${escapeHtml(c.category)} · ${escapeHtml(c.req)}</div>
          `;

          block.title = "클릭하여 시간표에서 제거";
          block.addEventListener("click", () => {
            removeCourse(c.id);
          });

          container.appendChild(block);
        }
      }
    }

    function escapeHtml(s){
      return String(s ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    /***********************
     * 4) 배치/삭제/겹침체크
     ************************/
    function rebuildOccupancy(){
      occupancy = {};
      for(const c of courses){
        if(!placed.has(c.id)) continue;
        for(const token of c.times){
          const parsed = parseTimeToken(token);
          if(!parsed) continue;
          for(const p of parsed.periods){
            const key = `${parsed.day}-${p}`;
            if(!occupancy[key]) occupancy[key] = [];
            occupancy[key].push(c.id);
          }
        }
      }
    }

    function computeConflicts(){
      rebuildOccupancy();
      conflictSet = new Set();
      for(const key of Object.keys(occupancy)){
        const ids = occupancy[key];
        if(ids.length >= 2){
          for(const id of ids) conflictSet.add(id);
        }
      }
    }

    function addCourse(id){
      placed.add(id);
      saveState();
      renderGrid();
    }

    function removeCourse(id){
      placed.delete(id);
      saveState();
      renderGrid();
      renderAccordions();
    }

    function resetTimetable(){
      placed.clear();
      saveState();
      renderGrid();
      renderAccordions();
    }

    /***********************
     * 5) 왼쪽: 학년 토글 + 아코디언(접기/펼치기) + 색 지정
     ************************/
    function renderGradeToggles(){
      const el = document.getElementById("gradeToggles");
      el.innerHTML = "";

      const allBtn = document.createElement("div");
      const allActive = gradeFilter.size === 4;
      allBtn.className = "pill" + (allActive ? " active" : "");
      allBtn.textContent = "전체";
      allBtn.addEventListener("click", () => {
        gradeFilter = new Set([1,2,3,4]);
        saveState();
        renderGradeToggles();
        renderAccordions();
      });
      el.appendChild(allBtn);
      
      for (const g of [1,2,3,4]) {
        const div = document.createElement("div");
        div.className = "pill" + (gradeFilter.has(g) ? " active" : "");
        div.textContent = `${g}학년`;
        div.addEventListener("click", () => {
          if (gradeFilter.has(g)) gradeFilter.delete(g);
          else gradeFilter.add(g);
          saveState();
          renderGradeToggles();
          renderAccordions();
        });
        el.appendChild(div);
      }
    }   
      
    function renderAccordions(){
      const host = document.getElementById("courseAccordions");
      host.innerHTML = "";

      const byGrade = new Map([[1,[]],[2,[]],[3,[]],[4,[]]]);
      for(const c of courses){
        const g = Number(c.grade);
        if(byGrade.has(g)) byGrade.get(g).push(c);
      }

      const gradeOrder = [1,2,3,4];
      for(const g of gradeOrder){
        const list = byGrade.get(g) || [];
        if(!gradeFilter.has(g)) continue;
        const filtered = list;

        const details = document.createElement("details");
        details.open = true;

        const summary = document.createElement("summary");
        summary.innerHTML = `🎓 ${g}학년 <span class="countBadge">${filtered.length}개</span>`;
        details.appendChild(summary);

        for(const c of filtered){
          const color = colorsById[c.id] || (colorsById[c.id] = defaultColorFor(c.id));

          const card = document.createElement("div");
          card.className = "course";

          const top = document.createElement("div");
          top.className = "courseTop";
          top.innerHTML = `
            <div>
              <p class="courseName">${escapeHtml(c.name)}</p>
              <div class="courseInfo">
                ${escapeHtml(c.category)} · ${escapeHtml(c.req)} · ${escapeHtml(c.room)}<br>
                시간: <b style="color:rgba(255,255,255,.80)">${escapeHtml(c.times.join(", "))}</b>
              </div>
            </div>
          `;

          const actions = document.createElement("div");
          actions.className = "courseActions";

          const colorInput = document.createElement("input");
          colorInput.type = "color";
          colorInput.value = color;
          colorInput.title = "블록 색상";
          colorInput.addEventListener("input", (e) => {
            colorsById[c.id] = e.target.value;
            saveState();
            renderGrid(); // 배치된 블록이면 즉시 반영
          });

          const addBtn = document.createElement("button");
          addBtn.className = "smallBtn add";
          addBtn.textContent = placed.has(c.id) ? "추가됨 ✅" : "시간표에 추가 ➕";
          addBtn.disabled = placed.has(c.id);
          addBtn.addEventListener("click", () => {
            addCourse(c.id);
            renderAccordions();
          });

          const rmBtn = document.createElement("button");
          rmBtn.className = "smallBtn remove";
          rmBtn.textContent = "제거";
          rmBtn.disabled = !placed.has(c.id);
          rmBtn.addEventListener("click", () => {
            removeCourse(c.id);
          });

          actions.appendChild(colorInput);
          actions.appendChild(addBtn);
          actions.appendChild(rmBtn);

          card.appendChild(top);
          card.appendChild(actions);

          details.appendChild(card);
        }

        host.appendChild(details);
      }
    }

    /***********************
     * 6) 초기화
     ************************/
    document.getElementById("resetBtn").addEventListener("click", resetTimetable);

    (async function init(){
      courses = await loadCourses();

      // id 중복 방지(혹시 몰라서)
      const seen = new Set();
      courses = courses.filter(c => {
        if(!c?.id) return false;
        if(seen.has(c.id)) return false;
        seen.add(c.id);
        return true;
      });
      loadState();

      // 기본 색 채우기
      for(const c of courses){
        if(!colorsById[c.id]) colorsById[c.id] = defaultColorFor(c.id);
      }

      renderGradeToggles();
      renderAccordions();
      renderGrid();
    })();
  </script>
</body>
</html>
